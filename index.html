<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>support ticket app</title>
    <link rel="stylesheet" href="ticket.css" />
    <script src="ticket.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 class="header-text">HELPDESK LITE</h1>
        <span class="button-toggle">🌙</span>
      </div>

      <div class="dashboard-text">
        <h3>Dashboard</h3>
      </div>

      <div class="search">
        <form class="form">
          <input
            type="text"
            placeholder="Search tickets…"
            class="input"
            id="search-input"
          />

          <div class="filter">
            <select id="filterByPriority">
              <option value="">All Priority</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <button type="button" id="newTicket" class="new-ticket-btn">
            New Ticket
          </button>
        </form>
      </div>

      <div class="status-dashboard">
        <div class="status-card">
          <h4 id="t-tickets">Total</h4>
          <p id="totalCount">0</p>
        </div>
        <div class="status-card">
          <h4 id="open">Open</h4>
          <p id="openCount">0</p>
        </div>
        <div class="status-card">
          <h4 id="in-progress">In Progress</h4>
          <p id="progressCount">0</p>
        </div>
        <div class="status-card">
          <h4 id="resolved">Resolved</h4>
          <p id="resolvedCount">0</p>
        </div>
      </div>

      <div class="description">
        <table class="ticket-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Title</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody class="ticket-list"></tbody>
        </table>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <div class="popUp" id="popupForm">
      <div class="form-card">
        <span class="close" id="closeBtn">&times;</span>
        <h2 id="update-header">Create Support Ticket</h2>
        <form id="ticketForm" style="display: flex; flex-direction: column">
          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            placeholder="Enter ticket title"
            required
          />

          <label for="priority">Priority</label>
          <select id="priority" required>
            <option value="">Select Priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="customer@email.com"
            required
          />

          <label for="description">Description</label>
          <textarea
            id="description"
            placeholder="Describe the issue…"
            required
          ></textarea>

          <button type="submit" class="submit-button" id="update-btn">
            Create Ticket
          </button>
        </form>
      </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="deleteModal" id="deleteModal">
      <div class="deleteCard">
        <h3>Confirm Delete</h3>
        <p>
          Are you sure you want to delete this ticket? This action cannot be
          undone.
        </p>
        <div class="buttons">
          <button id="cancelDeleteBtn">Cancel</button>
          <button id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </body>
</html>
